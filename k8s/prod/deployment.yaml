apiVersion: apps/v1
kind: Deployment
metadata:
  name: gambly-electric
  namespace: gambly-prod
  labels:
    app: gambly-electric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gambly-electric
  template:
    metadata:
      labels:
        app: gambly-electric
    spec:
      containers:
        - name: gambly-electric
          image: electricsql/electric:1.4.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gambly-electric-env
                  key: DATABASE_URL
            - name: ELECTRIC_SECRET
              valueFrom:
                secretKeyRef:
                  name: gambly-electric-env
                  key: ELECTRIC_SECRET
            - name: ELECTRIC_STORAGE_DIR
              value: /var/lib/electric/persistent
            # Keep the durable log/state store on EFS, but move the hot ShapeDb
            # onto local ephemeral storage to avoid EFS read contention.
            - name: ELECTRIC_SHAPE_DB_STORAGE_DIR
              value: /var/lib/electric/shape-db
            - name: ELECTRIC_SERVICE_NAME
              value: gambly-electric
            - name: ELECTRIC_SHAPE_DB_EXCLUSIVE_MODE
              value: "true"
            - name: ELECTRIC_EXPERIMENTAL_MAX_SHAPES
              value: "10000"
            - name: ELECTRIC_SHAPE_DB_SYNCHRONOUS
              value: NORMAL
          volumeMounts:
            - name: electric-storage
              mountPath: /var/lib/electric/persistent
            - name: electric-shape-db
              mountPath: /var/lib/electric/shape-db
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test "$(curl -so /dev/null -w '%{http_code}' http://localhost:3000/v1/health)" = "200"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "1"
              memory: 4Gi
      volumes:
        - name: electric-storage
          persistentVolumeClaim:
            claimName: gambly-electric
        - name: electric-shape-db
          emptyDir: {}
